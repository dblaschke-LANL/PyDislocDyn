name: CI

on:
  push:
    paths:
      - '**.py'
      - '**.f90'
      - '**.toml'
      - '**.yml'

jobs:
  RunTests:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.14"]
        toolchain:
          - {compiler: gcc, version: 'latest'}
          - {compiler: intel, version: '2025.0'}
        exclude:
          - os: macos-latest
            toolchain: {compiler: intel}
          - os: windows-latest
            toolchain: {compiler: gcc}
          - os: macos-latest
            python-version: '3.9'
          - os: windows-latest
            python-version: '3.9'
        include:
          - python-version: '3.9'
            module-versions: "numpy==1.26 scipy==1.10 sympy==1.12 matplotlib==3.8 pandas==1.5 jinja2 joblib==1.1 threadpoolctl gmpy2 numba==0.58.1 meson ninja pytest"
          - python-version: '3.14'
            module-versions: "numpy scipy sympy matplotlib pandas jinja2 joblib threadpoolctl gmpy2 numba meson ninja pytest"
    steps:
      - uses: actions/checkout@v6
      - name: Setup Fortran Compiler
        uses: fortran-lang/setup-fortran@v1
        if: runner.os == 'MacOS' || runner.os == 'Windows'
        with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }}
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ${{ matrix.module-versions }}
          pip install .
      - name: Run tests
        run: yes 2>/dev/null | pytest -s --durations=0 testing/
        if: runner.os != 'Windows'
      - name: Run tests windows
        run: echo 'N' | pytest -s --durations=0 testing/
        if: runner.os == 'Windows'
      - name: Upload log files as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: test-logfiles_${{runner.os}}_${{matrix.python-version}}
          path: |
            regressiontests/poly.log
            regressiontests/dragiso.log
            regressiontests/drag/dragsemi.log
            regressiontests/LT_exp/LT.log

